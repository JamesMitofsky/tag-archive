"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Copy local, gitignored env files into every new workspace.
file_include_globs = ".env\n.env.*\n!.env.example\n"

[scripts]
# Runs once when a workspace is created: install deps, build + seed the local
# Turso (libsql) database file from data/artefacts.json.
setup = "pnpm install && pnpm db:setup:local"
# Each workspace gets its own worktree + its own local.db and port range, so
# multiple workspaces can run at the same time.
run_mode = "concurrent"

# Spins up the local DB, a RustFS S3 store, and the local site together.
#   db     -> `turso dev` serving local.db over http on CONDUCTOR_PORT+1
#   rustfs -> S3-compatible store (dev stand-in for R2) on CONDUCTOR_PORT+2
#   web    -> vite dev on CONDUCTOR_PORT, pointed at that DB + RustFS
# S3_ENDPOINT/R2_PUBLIC_URL are exported (not in .env) so each workspace gets its
# own port and scan uploads never touch the prod R2 bucket. Requires Docker.
# RustFS data is ephemeral (no volume) — init-bucket.mjs recreates the bucket each boot.
[scripts.run.dev]
command = "export DB_PORT=$((CONDUCTOR_PORT+1)); export S3_PORT=$((CONDUCTOR_PORT+2)); export S3_ENDPOINT=http://127.0.0.1:$S3_PORT; export R2_PUBLIC_URL=http://127.0.0.1:$S3_PORT/tag-archive; pnpm exec concurrently -k -n db,rustfs,web -c magenta,yellow,cyan \"turso dev --db-file local.db --port $DB_PORT\" \"docker run --rm --name tag-archive-rustfs-$CONDUCTOR_PORT -p $S3_PORT:9000 -e RUSTFS_ACCESS_KEY=rustfsadmin -e RUSTFS_SECRET_KEY=rustfsadmin -e RUSTFS_ADDRESS=:9000 rustfs/rustfs:latest /data\" \"node --env-file-if-exists=.env scripts/init-bucket.mjs || echo '[init-bucket] skipped (storage unavailable)'; DATABASE_URL=http://127.0.0.1:$DB_PORT pnpm dev --port $CONDUCTOR_PORT\""
default = true
icon = "rocket"

# Drizzle Studio to inspect the local DB. Self-contained: starts its own `turso dev`
# on CONDUCTOR_PORT+1 and points Studio at it over HTTP (a port, not file:local.db,
# so no file-lock races) with its own backend port on CONDUCTOR_PORT+3.
# The hosted UI at https://local.drizzle.studio defaults to backend port 4983, so
# it must be opened with ?port=$STUDIO_PORT — otherwise parallel workspaces all hit
# 4983 and show whichever workspace bound it first (wrong DB). We echo that exact URL.
[scripts.run.studio]
command = "export DB_PORT=$((CONDUCTOR_PORT+1)); export STUDIO_PORT=$((CONDUCTOR_PORT+3)); echo \"Drizzle Studio: https://local.drizzle.studio/?port=$STUDIO_PORT\"; pnpm exec concurrently -k -n db,studio -c magenta,green \"turso dev --db-file local.db --port $DB_PORT\" \"DATABASE_URL=http://127.0.0.1:$DB_PORT pnpm exec drizzle-kit studio --port $STUDIO_PORT\""
icon = "database"
