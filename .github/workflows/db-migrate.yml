name: DB Migrate

# Apply pending Drizzle migrations to production whenever a commit lands on main
# that touches the migration folder. `drizzle-kit migrate` records applied
# migrations in the DB, so only new (pending) ones run — a no-op if none.
on:
  push:
    branches: [main]
    paths:
      - 'drizzle/**'
      - 'drizzle.config.ts'
  # Allow manual re-runs from the Actions tab.
  workflow_dispatch:

# Never let two migration runs race against the same database.
concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Pull DATABASE_URL / DATABASE_AUTH_TOKEN from the "production" environment secrets.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pending migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
